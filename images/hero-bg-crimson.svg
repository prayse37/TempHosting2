<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="cr-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0e"/>
      <stop offset="40%" style="stop-color:#2a1018"/>
      <stop offset="100%" style="stop-color:#14080b"/>
    </linearGradient>
    <linearGradient id="cr-glow1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BA0F39;stop-opacity:0.28"/>
      <stop offset="50%" style="stop-color:#E11D48;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#FB7185;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cr-glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F43F5E;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#BA0F39;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cr-arcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BA0F39;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#FB7185;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="cr-burst" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#BA0F39;stop-opacity:0.22"/>
      <stop offset="70%" style="stop-color:#9F1239;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#450A0A;stop-opacity:0"/>
    </radialGradient>
    <filter id="cr-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
    <linearGradient id="cr-fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="50%" style="stop-color:#100507;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#100507;stop-opacity:0.55"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#cr-sky)"/>
  <ellipse cx="220" cy="880" rx="520" ry="380" fill="url(#cr-glow1)" filter="url(#cr-soft)" opacity="0.9"/>
  <ellipse cx="1580" cy="200" rx="480" ry="420" fill="url(#cr-glow2)" filter="url(#cr-soft)" opacity="0.85"/>
  <ellipse cx="960" cy="320" rx="900" ry="500" fill="url(#cr-burst)" opacity="0.72"/>
  <path d="M-40 720 Q 480 520 960 480 T 1960 380" fill="none" stroke="url(#cr-arcGrad)" stroke-width="3" opacity="0.5"/>
  <path d="M-40 780 Q 520 600 960 560 T 1960 460" fill="none" stroke="#BA0F39" stroke-width="1.5" opacity="0.22"/>
