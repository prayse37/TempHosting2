    <line x1="320" y1="1080" x2="380" y2="760"/><line x1="520" y1="1080" x2="580" y2="740"/><line x1="720" y1="1080" x2="780" y2="720"/>
    <line x1="920" y1="1080" x2="980" y2="700"/><line x1="1120" y1="1080" x2="1180" y2="720"/><line x1="1320" y1="1080" x2="1380" y2="740"/>
    <line x1="1520" y1="1080" x2="1580" y2="760"/>
