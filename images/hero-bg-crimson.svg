  <g fill="#F43F5E">
    <circle cx="280" cy="180" r="3" opacity="0.55"/><circle cx="420" cy="240" r="2" opacity="0.38"/><circle cx="1500" cy="160" r="2.5" opacity="0.48"/>
    <circle cx="1640" cy="320" r="2" opacity="0.32"/><circle cx="1780" cy="200" r="3" opacity="0.42"/><circle cx="200" cy="400" r="2" opacity="0.28"/><circle cx="1720" cy="480" r="2" opacity="0.3"/>
  </g>
  <g stroke="#FB7185" stroke-width="1" opacity="0.22">
