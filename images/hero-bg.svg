<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF"/>
      <stop offset="45%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:0.22"/>
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.2"/>
      <stop offset="70%" style="stop-color:#1D4ED8;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="55%" style="stop-color:#fff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:0.45"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Soft ambient washes -->
  <ellipse cx="220" cy="880" rx="520" ry="380" fill="url(#glow1)" filter="url(#soft)" opacity="0.9"/>
  <ellipse cx="1580" cy="200" rx="480" ry="420" fill="url(#glow2)" filter="url(#soft)" opacity="0.85"/>
  <ellipse cx="960" cy="320" rx="900" ry="500" fill="url(#burst)" opacity="0.7"/>

  <!-- Upward vision arcs (abstract horizon / trajectory) -->
  <path d="M-40 720 Q 480 520 960 480 T 1960 380" fill="none" stroke="url(#arcGrad)" stroke-width="3" opacity="0.45"/>
  <path d="M-40 780 Q 520 600 960 560 T 1960 460" fill="none" stroke="#1D4ED8" stroke-width="1.5" opacity="0.2"/>
  <path d="M-40 840 Q 560 680 960 640 T 1960 540" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.18"/>

  <!-- Subtle tech grid (perspective toward future) -->
  <g opacity="0.12" stroke="#1D4ED8" stroke-width="1" fill="none">
    <line x1="0" y1="900" x2="1920" y2="820"/>
    <line x1="0" y1="940" x2="1920" y2="860"/>
    <line x1="0" y1="980" x2="1920" y2="900"/>
    <line x1="320" y1="1080" x2="380" y2="760"/>
    <line x1="520" y1="1080" x2="580" y2="740"/>
    <line x1="720" y1="1080" x2="780" y2="720"/>
    <line x1="920" y1="1080" x2="980" y2="700"/>
    <line x1="1120" y1="1080" x2="1180" y2="720"/>
    <line x1="1320" y1="1080" x2="1380" y2="740"/>
    <line x1="1520" y1="1080" x2="1580" y2="760"/>
  </g>

  <!-- Achievement sparkles / constellation -->
  <g fill="#1D4ED8">
    <circle cx="280" cy="180" r="3" opacity="0.5"/>
    <circle cx="420" cy="240" r="2" opacity="0.35"/>
    <circle cx="1500" cy="160" r="2.5" opacity="0.45"/>
    <circle cx="1640" cy="320" r="2" opacity="0.3"/>
    <circle cx="1780" cy="200" r="3" opacity="0.4"/>
    <circle cx="200" cy="400" r="2" opacity="0.25"/>
    <circle cx="1720" cy="480" r="2" opacity="0.28"/>
  </g>
  <g stroke="#6366F1" stroke-width="1" opacity="0.2">
    <line x1="280" y1="180" x2="420" y2="240"/>
    <line x1="1500" y1="160" x2="1640" y2="320"/>
    <line x1="1640" y1="320" x2="1780" y2="200"/>
  </g>

  <!-- Abstract ascending blocks (growth / milestones) -->
  <g opacity="0.22">
    <rect x="1240" y="620" width="56" height="120" rx="8" fill="#1D4ED8" transform="skewX(-8)"/>
    <rect x="1320" y="560" width="48" height="180" rx="8" fill="#3B82F6" transform="skewX(-8)"/>
    <rect x="1390" y="500" width="52" height="240" rx="8" fill="#6366F1" transform="skewX(-8)"/>
  </g>

  <!-- Bottom wash for legibility where hero meets next section -->
  <rect width="1920" height="1080" fill="url(#fadeBottom)"/>
</svg>
