<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Trendy cool base: airy blue → soft indigo depth -->
    <linearGradient id="hx-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FF"/>
      <stop offset="35%" style="stop-color:#DBEAFE"/>
      <stop offset="70%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#EEF2FF"/>
    </linearGradient>
    <!-- Electric cobalt + cyan “active” glows -->
    <linearGradient id="hx-glow1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.28"/>
      <stop offset="45%" style="stop-color:#06B6D4;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="hx-glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="hx-arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.15"/>
    </linearGradient>
    <radialGradient id="hx-burst" cx="52%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.2"/>
      <stop offset="55%" style="stop-color:#3B82F6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="hx-pop" cx="80%" cy="75%" r="40%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <filter id="hx-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
    <linearGradient id="hx-fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="58%" style="stop-color:#F8FAFC;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#hx-sky)"/>

  <ellipse cx="200" cy="860" rx="540" ry="400" fill="url(#hx-glow1)" filter="url(#hx-soft)" opacity="0.95"/>
  <ellipse cx="1620" cy="180" rx="460" ry="400" fill="url(#hx-glow2)" filter="url(#hx-soft)" opacity="0.9"/>
  <ellipse cx="960" cy="300" rx="880" ry="480" fill="url(#hx-burst)" opacity="0.75"/>
  <ellipse cx="1520" cy="820" rx="380" ry="280" fill="url(#hx-pop)" opacity="0.85"/>

  <path d="M-40 700 Q 460 500 960 460 T 1980 360" fill="none" stroke="url(#hx-arcGrad)" stroke-width="3.5" opacity="0.55"/>
  <path d="M-40 760 Q 500 580 960 540 T 1980 440" fill="none" stroke="#2563EB" stroke-width="1.75" opacity="0.22"/>
  <path d="M-40 820 Q 540 660 960 620 T 1980 520" fill="none" stroke="#06B6D4" stroke-width="1.25" opacity="0.2"/>

  <g opacity="0.14" stroke="#2563EB" stroke-width="1" fill="none">
    <line x1="0" y1="900" x2="1920" y2="815"/>
    <line x1="0" y1="940" x2="1920" y2="855"/>
    <line x1="0" y1="985" x2="1920" y2="895"/>
    <line x1="300" y1="1080" x2="365" y2="755"/>
    <line x1="500" y1="1080" x2="565" y2="735"/>
    <line x1="700" y1="1080" x2="765" y2="715"/>
    <line x1="900" y1="1080" x2="965" y2="695"/>
    <line x1="1100" y1="1080" x2="1165" y2="715"/>
    <line x1="1300" y1="1080" x2="1365" y2="735"/>
    <line x1="1500" y1="1080" x2="1565" y2="755"/>
  </g>

  <g fill="#2563EB">
    <circle cx="300" cy="160" r="3.5" opacity="0.45"/>
    <circle cx="450" cy="220" r="2.5" opacity="0.32"/>
    <circle cx="1480" cy="140" r="3" opacity="0.4"/>
    <circle cx="1660" cy="300" r="2.5" opacity="0.28"/>
    <circle cx="1800" cy="190" r="3.5" opacity="0.38"/>
    <circle cx="220" cy="380" r="2" opacity="0.22"/>
    <circle cx="1700" cy="460" r="2.5" opacity="0.26"/>
  </g>
  <g stroke="#06B6D4" stroke-width="1.2" opacity="0.25">
    <line x1="300" y1="160" x2="450" y2="220"/>
    <line x1="1480" y1="140" x2="1660" y2="300"/>
    <line x1="1660" y1="300" x2="1800" y2="190"/>
  </g>

  <g opacity="0.2">
    <rect x="1260" y="600" width="54" height="125" rx="10" fill="#2563EB" transform="skewX(-8)"/>
    <rect x="1335" y="545" width="50" height="185" rx="10" fill="#06B6D4" transform="skewX(-8)"/>
    <rect x="1405" y="485" width="52" height="248" rx="10" fill="#6366F1" transform="skewX(-8)"/>
  </g>

  <rect width="1920" height="1080" fill="url(#hx-fadeBottom)"/>
</svg>
